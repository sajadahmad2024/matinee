server:
  http_listen_port: 9080 # Ensure this matches the port used in docker-compose
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push # Assuming Promtail is configured to push to Loki service

scrape_configs:
  - job_name: app1
    static_configs:
      - targets:
          - localhost
        labels:
          job: app1
          __path__: /app1-logs/*.log
  - job_name: app2
    static_configs:
      - targets:
          - localhost
        labels:
          job: app2
          __path__: /app2-logs/*.log