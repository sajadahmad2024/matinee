# ElasticMQ — local, SQS-compatible queue server (stands in for AWS SQS in dev).
# node-address must match the host-exposed endpoint so returned QueueUrls are reachable.
include classpath("application.conf")

node-address {
    protocol = http
    host = localhost
    port = 9326
    context-path = ""
}

rest-sqs {
    enabled = true
    bind-port = 9326
    bind-hostname = "0.0.0.0"
    sqs-limits = strict
}

# Queues are also created idempotently by the app's QueueBootstrap on boot;
# declaring them here pre-wires the dead-letter redrive policy for local parity with prod.
queues {
    "maintinee-local-email" {
        defaultVisibilityTimeout = 30 seconds
        deadLettersQueue { name = "maintinee-local-email-dlq", maxReceiveCount = 5 }
    }
    "maintinee-local-email-dlq" { }

    "maintinee-local-cron" {
        defaultVisibilityTimeout = 30 seconds
        deadLettersQueue { name = "maintinee-local-cron-dlq", maxReceiveCount = 5 }
    }
    "maintinee-local-cron-dlq" { }
}
