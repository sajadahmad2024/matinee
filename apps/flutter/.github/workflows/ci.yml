# GitHub Actions CI/CD Pipeline for Flutter Boilerplate
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.9.2"
  JAVA_VERSION: "17"

jobs:
  # ============================================
  # ANALYZE & LINT
  # ============================================
  analyze:
    name: 🔍 Analyze & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Run Flutter analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: 🎨 Check code formatting
        run: dart format --set-exit-if-changed .

      - name: 🔧 Verify code generation
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          if git diff --exit-code; then
            echo "✅ Code generation is up to date"
          else
            echo "❌ Generated files are out of sync"
            echo "Run: flutter pub run build_runner build --delete-conflicting-outputs"
            exit 1
          fi

  # ============================================
  # UNIT TESTS
  # ============================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analyze

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🧪 Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: flutter-coverage
          fail_ci_if_error: false

      - name: 📈 Generate coverage HTML report
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          genhtml coverage/lcov.info -o coverage/html

      - name: 📤 Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/
          retention-days: 30

  # ============================================
  # INTEGRATION TESTS
  # ============================================
  integration_test:
    name: 🧪 Integration Tests
    runs-on: macos-latest
    timeout-minutes: 30
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 📱 Start iOS Simulator
        run: |
          xcrun simctl boot "iPhone 15 Pro" || true
          xcrun simctl list devices

      - name: 🧪 Run integration tests
        run: flutter test integration_test/
        continue-on-error: true

  # ============================================
  # BUILD ANDROID (Debug)
  # ============================================
  build_android_debug:
    name: 🤖 Build Android Debug
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build Android Debug APK
        run: flutter build apk --debug

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ============================================
  # BUILD ANDROID (Release)
  # ============================================
  build_android_release:
    name: 🤖 Build Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build Android Release APK
        run: flutter build apk --release

      - name: 🔨 Build Android App Bundle
        run: flutter build appbundle --release

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📤 Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ============================================
  # BUILD iOS
  # ============================================
  build_ios:
    name: 🍎 Build iOS
    runs-on: macos-latest
    timeout-minutes: 45
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: 📤 Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

  # ============================================
  # BUILD WEB
  # ============================================
  build_web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Build Web
        run: flutter build web --release

      - name: 📤 Upload Web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release-build
          path: build/web/
          retention-days: 30

  # ============================================
  # SUMMARY
  # ============================================
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [analyze, test, build_android_debug]
    if: always()

    steps:
      - name: 📋 Check workflow status
        run: |
          echo "## 🎉 CI/CD Pipeline Summary"
          echo "✅ Analyze: ${{ needs.analyze.result }}"
          echo "✅ Tests: ${{ needs.test.result }}"
          echo "✅ Android Build: ${{ needs.build_android_debug.result }}"
