---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10m
      repeat_interval: 1h
      receiver: 'slack-notifications'

    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#alerts'
            send_resolved: true
            text: |
              *Alert:* {{ .CommonLabels.alertname }}
              *Summary:* {{ .CommonAnnotations.summary }}
              *Description:* {{ .CommonAnnotations.description }}
              *Grafana Dashboard:* {{ .CommonAnnotations.dashboard }}
              *Severity:* {{ .CommonLabels.severity }}
            title: "Alert: {{ .CommonLabels.alertname }} - Severity: {{ .CommonLabels.severity }}"

