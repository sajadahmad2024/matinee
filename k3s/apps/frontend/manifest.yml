apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-prod
  namespace: <NAME OF NAMESPACE>
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-prod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0 
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend-prod
    spec:
      imagePullSecrets:
      - name: docker-creds
      containers:
      - name: frontend-prod
        image: <DOCKER IMAGE URI>
        imagePullPolicy: Always
        ports:
        - containerPort: <app-port> ##port in which your app runs
        resources:
          requests:
            cpu: "1000m"       
            memory: "1024Mi"   
          limits:
            cpu: "1000m"       
            memory: "2048Mi"
        readinessProbe:                     
          httpGet:
            path: /<health-check-endpoint>
            port: <app-port> ##port in which your app runs
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:                     
          httpGet:
            path: /<health-check-endpoint>
            port: <app-port> ##port in which your app runs
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-prod
  namespace: <NAME OF NAMESPACE>
spec:
  selector:
    app: frontend-prod
  ports:
    - protocol: TCP
      port: <svc-port> ##port in which your service should run. Note: this cannot de duplicate in type LoadBalancer.
      targetPort: <app-port> ##port in which your app runs
  type: LoadBalancer
